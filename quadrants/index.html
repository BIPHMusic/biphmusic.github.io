<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadrants - Non-overlapping Students</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, rgb(45, 70, 119), rgb(9, 32, 79));
            font-family: Arial, sans-serif;
            user-select: none;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 2em;
            padding: 20px;
            box-sizing: border-box;
        }
        .student {
            position: absolute;
            background: rgba(255, 255, 255, 0.12);
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.294);
            border-radius: 15px;
            color: white;
            transform: translate(-50%, -50%);
            transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            pointer-events: none;
            white-space: nowrap;
            font-size: 1.1em;
            opacity: 0;
        }
        .shuffle-btn {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }
                input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 2em;
            text-align: center;
        }
        input:focus {
            outline: none;
        }
        .shuffle-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%) scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"><input type="text" placeholder=""></div>
        <div class="box"><input type="text" placeholder=""></div>
        <div class="box"><input type="text" placeholder=""></div>
        <div class="box"><input type="text" placeholder=""></div>
        <button class="shuffle-btn">🔀</button>
    </div>

    <script>
        const students = [
            'Ben', 'Howard', 'Terry', 'Alice', 'Vincent', 'Tiger', 'Chris', 'Lucy',
            'Diego', 'Hailey', 'Eileen', 'Angelina', 'Serena', 'Catherine', 'Andrew', 'Jennifer'
        ];

        const container = document.querySelector('.container');
        const shuffleBtn = document.querySelector('.shuffle-btn');

        // Create student elements
        students.forEach(name => {
            const div = document.createElement('div');
            div.className = 'student';
            div.textContent = name;
            // Start at center
            div.style.left = '50%';
            div.style.top = '50%';
            container.appendChild(div);
        });

        const studentElements = document.querySelectorAll('.student');

        function getRandomPositionInQuadrant(quadIndex, existingPositions, minDistance = 90) {
            const rect = container.getBoundingClientRect();
            const qWidth = rect.width / 2;
            const qHeight = rect.height / 2;

            const baseX = (quadIndex % 2) * qWidth;
            const baseY = Math.floor(quadIndex / 2) * qHeight;

            const maxAttempts = 80;   // prevent infinite loop
            let attempts = 0;

            while (attempts < maxAttempts) {
                attempts++;

                // Keep some margin from quadrant edges
                const x = baseX + 80 + Math.random() * (qWidth - 160);
                const y = baseY + 70 + Math.random() * (qHeight - 140);

                // Check distance to all existing positions
                let tooClose = false;
                for (const pos of existingPositions) {
                    const dx = x - pos.x;
                    const dy = y - pos.y;
                    if (Math.sqrt(dx * dx + dy * dy) < minDistance) {
                        tooClose = true;
                        break;
                    }
                }

                if (!tooClose) {
                    return { x, y };
                }
            }

            // Fallback: just return a random position if we can't find a good one
            return {
                x: baseX + 80 + Math.random() * (qWidth - 160),
                y: baseY + 70 + Math.random() * (qHeight - 140)
            };
        }

        function shuffle() {
            // Make all visible
            studentElements.forEach(s => s.style.opacity = '1');

            const quadrants = [[], [], [], []];
            const shuffled = [...studentElements].sort(() => Math.random() - 0.5);

            // Distribute evenly
            shuffled.forEach((student, i) => {
                quadrants[i % 4].push(student);
            });

            // Position each quadrant
            quadrants.forEach((quadStudents, qIndex) => {
                const positions = [];   // track occupied spots in this quadrant

                quadStudents.forEach(student => {
                    const pos = getRandomPositionInQuadrant(qIndex, positions, 95);
                    positions.push(pos);

                    student.style.left = `${pos.x}px`;
                    student.style.top = `${pos.y}px`;
                });
            });
        }

        shuffleBtn.addEventListener('click', shuffle);

        // Initial shuffle on load
        window.addEventListener('load', () => {
            setTimeout(shuffle, 300);
        });

        // Resize handling
        window.addEventListener('resize', () => {
            const rect = container.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            studentElements.forEach(s => {
                s.style.left = `${centerX}px`;
                s.style.top = `${centerY}px`;
            });
        });
    </script>
</body>
</html>
