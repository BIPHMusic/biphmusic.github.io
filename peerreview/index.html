<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer Review</title>
    <link rel="icon" href="../icons/BGicon.png">
    <style>
        @font-face {
            font-family: 'Zapfino';
            src: url('../fonts/Zapfino.ttf') format('truetype');
        }
        
        body {
            background-color: rgb(45, 70, 119);
            font-family: 'Andika', sans-serif;
            /* font-family: 'Helvetica Neue', Arial, sans-serif; */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            align-items: center; 
            text-align: center; 
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgb(45, 70, 119), rgb(9, 32, 79));
            opacity: 0.8;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, #303f6c 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, #236693 0%, transparent 50%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 1.5s infinite alternate;
        }
        .overlay2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 70%, #ffffff 0%, transparent 50%),
                        radial-gradient(circle at 30% 30%, #b8b8b8 0%, transparent 50%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% {
                opacity: 0.3;
                transform: scale(1); 
            }
            100% {
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        .logocontainer {
    min-height: 10vh;
    padding-bottom: 50px;
}

.logo {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 25vh;
    height: auto;
    z-index: 10; 
}

.Subtitle {
            font-family: 'Zapfino', sans-serif;
            color: white;
            margin-top: -0.7em;
            font-size: 40px;
        }


        .login-section {
            display:block;
            width: 100%;
            text-align: center;
        }

        .teacher-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .teacher-section.hidden {
            display: none;
        }

        .hidden {
            display: none;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .container {
            align-items: center;
            }

table {
    align-items: center;
    border-collapse: collapse;
    width: 80%;
    margin-bottom: 20px;
    margin: 20px auto;
}

th, td {
    border: 1px solid #dddddd;
    padding: 8px;
}

th {
    background-color: #f2f2f22e;
}

.total-points {
    margin-top: 20px;
}

    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="../menu.js"></script> 
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="overlay2"></div>

    <h1 class="Title">BIPH Music</h1>
    <h1 class="Subtitle">Peer Review</h1>

    <div class="logincontainer">
        <div id="login-section" class="login-section">
            <h2>Enter your name to begin</h2>
            <input type="text" id="name-input" placeholder="Your name" autofocus>
            <button onclick="checkName()">Begin</button>
            <div id="error-message" class="error"></div>
        </div>

        <div id="password-section" class="hidden">
            <h2>Teacher Mode</h2>
            <input type="password" id="password-input" placeholder="Enter password" autofocus>
            <button onclick="checkPassword()">Login</button>
        </div>
     

        <div id="container" class="hidden">

        <div class="media-player">
            <audio controls>
                <source src="audio/test.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>   

        <table>
            <thead>
                <tr>
                    <th>Criteria</th>
                    <th>Segment 1</th>
                    <th>Segment 2</th>
                    <th>Segment 3</th>
                    <th>Segment 4</th>
                    <th>Segment 5</th>
                    <th>Segment 6</th>
                    <th>Segment 7</th>
                    <th>Segment 8</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Rhythm</td>
                    <td><input type="checkbox" id="rhythm1"></td>
                    <td><input type="checkbox" id="rhythm2"></td>
                    <td><input type="checkbox" id="rhythm3"></td>
                    <td><input type="checkbox" id="rhythm4"></td>
                    <td><input type="checkbox" id="rhythm5"></td>
                    <td><input type="checkbox" id="rhythm6"></td>
                    <td><input type="checkbox" id="rhythm7"></td>
                    <td><input type="checkbox" id="rhythm8"></td>
                </tr>
                <tr>
                    <td>Pitch</td>
                    <td><input type="checkbox" id="pitch1"></td>
                    <td><input type="checkbox" id="pitch2"></td>
                    <td><input type="checkbox" id="pitch3"></td>
                    <td><input type="checkbox" id="pitch4"></td>
                    <td><input type="checkbox" id="pitch5"></td>
                    <td><input type="checkbox" id="pitch6"></td>
                    <td><input type="checkbox" id="pitch7"></td>
                    <td><input type="checkbox" id="pitch8"></td>
                </tr>
            </tbody>
        </table>
        <div class="total-points">
            <p id="total-points-display">0 total points awarded</p>
            <p id="percentage-display">0%</p>
            <button id="export-button">Export Data</button>
        </div>
</div>
    </div>
    <div class="logocontainer">        
        <img src="../icons/Full Logo White on Transparent.png" alt="BASIS Logo" class="logo">
    </div>
    <script>
const checkboxes = document.querySelectorAll('input[type="checkbox"]');
const totalPointsDisplay = document.getElementById('total-points-display');
const percentageDisplay = document.getElementById('percentage-display');
const approvedNames = [
            "ben", "howard", "terry", "alice",
            "vincent", "tiger", "chris", "lucy", "diego", "hailey", "eileen",
            "angelina", "serena", "catherine", "andrew", "jennifer", "mr. tubbs"
        ];

        const TEACHER_PASSWORD = '18721958';

        let currentStudent = '';
        let totalPoints = 0;
        let currentFocus = null;

        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.target.id === 'password-section' &&
                    !mutation.target.classList.contains('hidden')) {
                    document.getElementById('password-input').focus();
                }
            });
        });

        observer.observe(document.getElementById('password-section'), {
            attributes: true,
            attributeFilter: ['class']
        });

        function checkName() {
            const nameInput = document.getElementById('name-input').value.toLowerCase();
            const errorElement = document.getElementById('error-message');

            if (nameInput === 'mr. tubbs') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('password-section').classList.remove('hidden');
                return;
            }

            if (approvedNames.includes(nameInput)) {
                currentStudent = nameInput;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('container').classList.remove('hidden');
            } else {
                errorElement.textContent = 'Name not found in approved list';
            }
        }

        function checkPassword() {
            const password = document.getElementById('password-input').value;
            if (password === TEACHER_PASSWORD) {
                document.getElementById('password-section').classList.add('hidden');
                document.getElementById('teacher-section').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('json-input').click();
                }, 100);
            } else {
                alert('Incorrect password');
            }
        }

        checkboxes.forEach(checkbox => {
    checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
            totalPoints++;
        } else {
            totalPoints--;
        }
        updateTotalPoints();
    });
});

function updateTotalPoints() {
    const percentage = ((totalPoints / 16) * 100).toFixed(1);
    totalPointsDisplay.textContent = `${totalPoints} total points awarded`;
    percentageDisplay.textContent = `${percentage}%`;
}


document.addEventListener('keydown', (event) => {
    if (currentFocus === null && event.key in ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight']) {
        // Select B2 as the first cell
        const firstCheckbox = checkboxes[0];
        firstCheckbox.focus();
        currentFocus = firstCheckbox;
        return;
    }

    if (!currentFocus) return;

    let nextFocus = null;

    switch (event.key) {
        case 'ArrowUp':
            nextFocus = getNextCell(currentFocus, -1, 0);
            break;
        case 'ArrowDown':
            nextFocus = getNextCell(currentFocus, 1, 0);
            break;
        case 'ArrowLeft':
            nextFocus = getNextCell(currentFocus, 0, -1);
            break;
        case 'ArrowRight':
            nextFocus = getNextCell(currentFocus, 0, 1);
            break;
        case 'Space':
        case 'Enter':
            currentFocus.checked = !currentFocus.checked;
            if (currentFocus.checked) {
                totalPoints++;
            } else {
                totalPoints--;
            }
            updateTotalPoints();
            break;
        case 'Escape':
            checkboxes.forEach(checkbox => checkbox.blur());
            currentFocus = null;
            return;
    }

    if (nextFocus) {
        nextFocus.focus();
        currentFocus = nextFocus;
    }
});

function getNextCell(current, rowDelta, colDelta) {
    const table = current.closest('table');
    const rows = Array.from(table.querySelectorAll('tbody tr'));
    const currentRow = rows.indexOf(current.parentElement);
    const currentCol = Array.from(current.parentElement.children).indexOf(current);

    let newRow = currentRow + rowDelta;
    let newCol = currentCol + colDelta;

    while (newRow >= 0 && newRow < rows.length) {
        const cells = Array.from(rows[newRow].children);
        if (newCol >= 1 && newCol < cells.length) { // Skip first column
            return cells[newCol].querySelector('input');
        }
        newRow += rowDelta;
    }

    return null; // No valid cell found
}

function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }

document.getElementById('export-button').addEventListener('click', () => {
    const tableData = [];
    const rows = document.querySelectorAll('tbody tr');

    // Collect data from each row
    rows.forEach(row => {
        const rowData = {};
        const cells = Array.from(row.cells);
        
        cells.forEach((cell, index) => {
            if (index === 0) {
                rowData['Criteria'] = cell.textContent;
            } else {
                rowData[`Segment ${index}`] = cell.querySelector('input').checked ? 'Checked' : 'Unchecked';
            }
        });

        tableData.push(rowData);
    });

    // Add totals and percentage to the data
    const exportData = {
        tableData: tableData,
        totalPoints: totalPoints,
        percentage: ((totalPoints / 16) * 100).toFixed(2)
    };

    // Convert data to JSON string
    const jsonData = JSON.stringify(exportData, null, 4);

    // Create a Blob and download it as a file
    const blob = new Blob([jsonData], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    
    // Format the date for the file name
    const today = new Date();
    const formattedDate = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    
    // Create the file name with student's name, exercise type, and date
    a.download = `${capitalizeFirstLetter(currentStudent)} - Peer Review - ${formattedDate}.json`;
    
    a.click();
    URL.revokeObjectURL(url);
});



document.addEventListener('keydown', (event) => {
            if (event.key === 'Tab' && document.activeElement.tagName !== 'INPUT') {
                event.preventDefault();
                document.getElementById('name-input').focus();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Tab') {
                const firstBlankInput = document.querySelector('.answer-input:not([value])');
                if (!document.activeElement.classList.contains('answer-input') && firstBlankInput) {
                    event.preventDefault();
                    firstBlankInput.focus();
                }
            }
        });

        document.getElementById('name-input').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                checkName();
            }
        });

        document.getElementById('password-input').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                checkPassword();
            }
        });
    </script>
</body>
</html>
