<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Music Theory</title>
    <link rel="icon" href="icons/BGicon.png">
    <link rel="stylesheet" href="common-styles.css">
    <link rel="preload" href="fonts/Zapfino.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <style>
        /* SHARED STYLES */
        /* Loaded from common-styles.css - Do not duplicate/edit: */
        /* body, h1, .Subtitle, .background, .overlay, .overlay2, .logo */

        body {
            margin: 0;
            padding: 0;
        }

        .banner {
            position: relative;
            width: 100vw;
            height: 300px;
            overflow: hidden;
            z-index: 1;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
        }

        .banner-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 2;
        }

        .manuscript-background {
            position: absolute;
            top: 0; 
            left: 50%; 
            width: 100vw; 
            height: auto;
            min-height: 100%;
            transform: translateX(-50%); 
            object-fit: cover;
            opacity: 0.2;
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            text-align: center;
        }

        .countdown {
            margin: 20px 0;
            font-size: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .grid-item {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .grid-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .grid-item img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .zapfino {
            font-family: 'Zapfino', sans-serif; 
            font-size: 1.5em; 
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.322);
        }
        .greeting-text {
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="menu.js"></script>
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="overlay2"></div>

    <div class="banner">
        <img src="images/manuscript.png" alt="Manuscript Background" class="manuscript-background">
        <div class="banner-text" id="banner-text"></div>
    </div>

    <div class="container">
        <div class="countdown" id="upcoming-dates"></div>
        <p><h2>Our review activities for today:</h2></p>
        <div class="grid">
            <div class="grid-item" onclick="window.open('https://biphmusic.github.io/dailysightsinging/', '_blank')">
                <img src="images/sightsinging.png" alt="Sight Singing">
                Sight Singing
            </div>
            <div class="grid-item" onclick="window.open('https://biphmusic.github.io/eartraining/', '_blank')">
                <img src="images/eartraining.png" alt="Ear Training">
                Ear Training
            </div>
            <div class="grid-item" onclick="window.open('https://biphmusic.github.io/vocabreview/', '_blank')">
                <img src="images/vocabreview.png" alt="Vocabulary">
                Vocabulary
            </div>
            <div class="grid-item" onclick="window.open('https://apclassroom.collegeboard.org/', '_blank')">
                <img src="images/apclassroom.png" alt="AP Classroom Questions">
                AP Classroom Questions
            </div>
        </div>
    </div>

    <script>
        // Hamburger menu functionality
        const menuToggle = document.querySelector('.menu-toggle');
        const menuItems = document.querySelector('.menu-items');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('open');
            menuItems.classList.toggle('show');
        });

        // Close the menu when clicking outside
        document.addEventListener('click', (event) => {
            if (!menuToggle.contains(event.target) && !menuItems.contains(event.target)) {
                menuToggle.classList.remove('open');
                menuItems.classList.remove('show');
            }
        });

        // Banner text based on time of day
        function getGreeting() {
            const now = new Date();
            const hours = now.getHours();
            let greeting;

            if (hours < 12) {
                greeting = "Good morning";
            } else if (hours < 18) {
                greeting = "Good afternoon";
            } else {
                greeting = "Good evening";
            }

            const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            const dayOfWeek = daysOfWeek[now.getDay()];
            const month = months[now.getMonth()];
            const day = now.getDate();

            return `<style> 
                        .zapfino { font-family: 'Zapfino', sans-serif; font-size: 1.5em; } 
                        .greeting-text { text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); }
                    </style>
                    <div style="position: relative;">
                        <div style="position: relative; z-index: 0;">
                            <span class="zapfino">${greeting}!</span> <br>
                            <span class="greeting-text">Today is ${dayOfWeek}, ${month} ${day}.</span>
                        </div>
                    </div>`;
        }

        // Countdown to mock exam and AP exam
        function getCountdownText() {
            const now = new Date();
            const mockExamDate = new Date(now.getFullYear(), 1, 19); // February 19th
            const apExamDate = new Date(now.getFullYear(), 4, 12); // May 12th

            const mockDaysLeft = Math.ceil((mockExamDate - now) / (1000 * 60 * 60 * 24));
            const apDaysLeft = Math.ceil((apExamDate - now) / (1000 * 60 * 60 * 24));

            return `<h2>Dates of Importance</h2>
                    <p><strong>Mock Exam</strong>: February 19th <span style="opacity: 0.5; font-size: 0.8em;">(in ${mockDaysLeft} days)</span></p>
                    <p><strong>AP Exam</strong>: May 12th <span style="opacity: 0.5; font-size: 0.8em;">(in ${apDaysLeft} days)</span></p>
                    <br><br>`; // Added extra line breaks for more space
        }

        // Update banner text and countdown
        document.getElementById('banner-text').innerHTML = getGreeting();
        document.getElementById('upcoming-dates').innerHTML = getCountdownText();
    </script>
</body>
</html>
