<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Progressions</title>
    <link rel="icon" href="../icons/BGicon.png">
    <style>
        @font-face {
            font-family: 'Zapfino';
            src: url('fonts/Zapfino.ttf') format('truetype');
        }
        
        body {
            background-color: rgb(45, 70, 119);
            font-family: 'Andika', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgb(45, 70, 119), rgb(9, 32, 79));
            opacity: 0.8;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, #303f6c 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, #236693 0%, transparent 50%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 1.5s infinite alternate;
        }
        .overlay2 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 70%, #ffffff 0%, transparent 50%),
                        radial-gradient(circle at 30% 30%, #b8b8b8 0%, transparent 50%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% {
                opacity: 0.3;
                transform: scale(1); 
            }
            100% {
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        .logocontainer {
            min-height: 10vh;
            padding-bottom: 50px;
            bottom:10px;
        }

        .logo {
            position: absolute;
            right: 0;
            bottom: 10px;
            width: 25vh;
            height: auto;
            z-index: 10; 
        }

        .Subtitle {
            font-family: 'Zapfino', sans-serif;
            color: white;
            margin-top: -0.7em;
            font-size: 40px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* Chord progression specific styles */
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-align: center;
        }

        #progression {
            font-size: 2rem;
            margin: 40px 0;
            padding: 20px;
            background-color: rgba(15, 22, 33, 0.441);
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80%;
            max-width: 800px;
            text-align: center;
        }

        button2 {
            font-size: 1.2rem;
            padding: 12px 24px;
            background-color: #4575a0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button2:hover {
            background-color: #5585b0;
        }
    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="../menu.js"></script> 
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="overlay2"></div>

    <h1 class="Title">BIPH Music</h1>
    <h1 class="Subtitle">Chord Progressions</h1>

    <div class="container">
        <div class="subtitle">(Tonic → Predominant → Dominant)</div>
        <div id="progression">Generate your first progression</div>
        <button2 onclick="generateProgression()">Randomize</button>
    </div>

    <div class="logocontainer">        
        <img src="../icons/Full Logo White on Transparent.png" alt="BASIS Logo" class="logo">
    </div>
    
    <script>
        const keys = ["C", "C#", "Db", "D", "Eb", "E", "F", "F#", "Gb", "G", "Ab", "A", "Bb", "B"];
        const tonic = ["I"];
        const predominant = ["ii", "ii6", "IV", "V/V", "IV7", "ii7", "I64"];
        const dominant = ["V", "V7", "vii6", "V6"];
        const tonic2 = ["I", "I", "I", "vi"];

        function getRandomElement(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function generateProgression() {
            const key = getRandomElement(keys);
            const prog = `${key}: ${tonic[0]}, ${getRandomElement(predominant)}, ${getRandomElement(dominant)}, ${getRandomElement(tonic2)}`;
            
            const progressionElement = document.getElementById('progression');
            progressionElement.textContent = prog;
        }
    </script>
</body>
</html>
