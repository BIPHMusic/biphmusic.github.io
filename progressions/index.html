<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Progressions</title>
    <link rel="icon" href="../icons/BGicon.png">
    <link rel="stylesheet" href="../common-styles.css">
    <link rel="preload" href="../fonts/Zapfino.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <style>
        /* SHARED STYLES */
        /* Loaded from common-styles.css - Do not duplicate/edit: */
        /* body, h1, .Subtitle, .background, .overlay, .overlay2, .logo */

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        #progression {
            font-size: 2rem;
            margin: 40px 0;
            padding: 20px;
            background-color: rgba(15, 22, 33, 0.441);
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80%;
            max-width: 800px;
            text-align: center;
        }

        button2 {
            font-size: 1.2rem;
            padding: 12px 24px;
            background-color: #4575a0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button2:hover {
            background-color: #5585b0;
        }
    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="../menu.js"></script> 
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="overlay2"></div>

    <h1 class="Title">BIPH Music</h1>
    <h1 class="Subtitle">Chord Progressions</h1>

    <div class="container">
        <div class="subtitle">(Tonic → Predominant → Dominant)</div>
        <div id="progression">Generate your first progression</div>
        <button2 onclick="generateProgression()">Randomize</button>
    </div>

    <div class="logocontainer">        
        <img src="../icons/Full Logo White on Transparent.png" alt="BASIS Logo" class="logo">
    </div>
    
    <script>
        const keys = ["C", "C#", "Db", "D", "Eb", "E", "F", "F#", "Gb", "G", "Ab", "A", "Bb", "B"];
        const tonic = ["I"];
        const predominant = ["ii", "ii6", "IV", "V/V", "IV7", "ii7", "I64"];
        const dominant = ["V", "V7", "vii6", "V6"];
        const tonic2 = ["I", "I", "I", "vi"];

        function getRandomElement(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function generateProgression() {
            const key = getRandomElement(keys);
            const prog = `${key}: ${tonic[0]}, ${getRandomElement(predominant)}, ${getRandomElement(dominant)}, ${getRandomElement(tonic2)}`;
            
            const progressionElement = document.getElementById('progression');
            progressionElement.textContent = prog;
        }
    </script>
</body>
</html>
