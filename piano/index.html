<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Piano</title>
    <link rel="icon" href="../icons/BGicon.png">
    <link rel="stylesheet" href="../common-styles.css">
    <link rel="preload" href="../fonts/Zapfino.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <style>
        /* SHARED STYLES */
        /* Loaded from common-styles.css - Do not duplicate/edit: */
        /* body, h1, .Subtitle, .background, .overlay, .overlay2, .logo */

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; 
            user-select: none;
        }

        .piano {
            display: flex;
            position: relative;
            margin-top: 50px;
            border: 3px solid black;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            touch-action: manipulation; /* Improves touch responsiveness */
        }

        .key {
            width: 60px;
            height: 250px;
            border: 1px solid #000;
            background-color: #fff;
            margin-right: -1px;
            cursor: pointer;
        }

        .key:active, .key.active {
            background-color: #ddd;
        }

        .black-key {
            position: absolute;
            width: 40px;
            height: 150px;
            background-color: #000;
            z-index: 1;
            cursor: pointer;
        }

        .black-key:active, .black-key.active {
            background-color: #333;
        }

        /* Mobile specific styles for landscape orientation */
        @media (orientation: portrait) and (max-width: 768px) {
            body {
                transform: rotate(90deg);
                transform-origin: top left;
                width: 100vh; 
                height: 100vw; 
                overflow-x: hidden; 
                position: absolute;
                top: 0; 
                left: 100%; 
                padding: 0; 
            }
            .piano {
                margin-left: -50px;
                transform: scale(0.85);
            }
            h1, .Subtitle {
                font-size: 2rem; 
            }
            .Subtitle {
                margin-bottom: -80px;
            }

            .menu-items {
                overflow-x: auto;
                overflow-y: auto;
            }
        }

        @media (orientation: landscape) and (max-height: 768px) {
            .piano {
                transform: scale(0.85); 
                margin-top: 20px;
            }
            h1, .Subtitle {
                font-size: 2rem;
            }
        }

        /* Prevent system zoom on touch */
        html, body {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="../menu.js"></script>
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="overlay2"></div>

    <h1 class="Title">BIPH Music</h1>
    <h1 class="Subtitle">Web Piano</h1>

    <div class="container">
        <img src="../icons/Full Logo White on Transparent.png" alt="BASIS Logo" class="logo">
    </div>

    <div class="piano">
        <div class="key" data-note="C" data-octave="4"></div>
        <div class="black-key" data-note="C#" data-octave="4" style="left: 40px;"></div>
        <div class="key" data-note="D" data-octave="4"></div>
        <div class="black-key" data-note="D#" data-octave="4" style="left: 100px;"></div>
        <div class="key" data-note="E" data-octave="4"></div>
        <div class="key" data-note="F" data-octave="4"></div>
        <div class="black-key" data-note="F#" data-octave="4" style="left: 220px;"></div>
        <div class="key" data-note="G" data-octave="4"></div>
        <div class="black-key" data-note="G#" data-octave="4" style="left: 280px;"></div>
        <div class="key" data-note="A" data-octave="4"></div>
        <div class="black-key" data-note="A#" data-octave="4" style="left: 340px;"></div>
        <div class="key" data-note="B" data-octave="4"></div>
        <div class="key" data-note="C" data-octave="5"></div>
        <div class="black-key" data-note="C#" data-octave="5" style="left: 460px;"></div>
        <div class="key" data-note="D" data-octave="5"></div>
        <div class="black-key" data-note="D#" data-octave="5" style="left: 520px;"></div>
        <div class="key" data-note="E" data-octave="5"></div>
        <div class="key" data-note="F" data-octave="5"></div>
        <div class="black-key" data-note="F#" data-octave="5" style="left: 640px;"></div>
        <div class="key" data-note="G" data-octave="5"></div>
        <div class="black-key" data-note="G#" data-octave="5" style="left: 700px;"></div>
        <div class="key" data-note="A" data-octave="5"></div>
        <div class="black-key" data-note="A#" data-octave="5" style="left: 760px;"></div>
        <div class="key" data-note="B" data-octave="5"></div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        const noteFrequencies = {
            'C': 261.63,
            'C#': 277.18,
            'D': 293.66,
            'D#': 311.13,
            'E': 329.63,
            'F': 349.23,
            'F#': 369.99,
            'G': 392.00,
            'G#': 415.30,
            'A': 440.00,
            'A#': 466.16,
            'B': 493.88
        };

        const keyMap = {
            'A': {note: 'C', octave: 4},
            'W': {note: 'C#', octave: 4},
            'S': {note: 'D', octave: 4},
            'E': {note: 'D#', octave: 4},
            'D': {note: 'E', octave: 4},
            'F': {note: 'F', octave: 4},
            'T': {note: 'F#', octave: 4},
            'G': {note: 'G', octave: 4},
            'Y': {note: 'G#', octave: 4},
            'H': {note: 'A', octave: 4},
            'U': {note: 'A#', octave: 4},
            'J': {note: 'B', octave: 4},
            'K': {note: 'C', octave: 5},
            'O': {note: 'C#', octave: 5},
            'L': {note: 'D', octave: 5},
            'P': {note: 'D#', octave: 5},
            ';': {note: 'E', octave: 5},
            "'": {note: 'F', octave: 5},
            "]": {note: 'F#', octave: 5},
            "ENTER": {note: 'G', octave: 5},
        };

        // This map stores information about currently active notes, including the oscillator and the key element
        const activeNotes = new Map(); // Stores { identifier: { oscillator, gainNode, keyElement } }

        function createAndPlayNote(note, octave, identifier, keyElement) {
            const frequency = noteFrequencies[note] * Math.pow(2, octave - 4);
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);

            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            // Notes will ring out for 1 second by default
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 1); // Ensures resources are released after decay

            activeNotes.set(identifier, { oscillator, gainNode, keyElement });
        }

        function activateKeyVisual(keyElement) {
            if (keyElement) {
                keyElement.classList.add('active');
            }
        }

        function deactivateKeyVisual(keyElement) {
            if (keyElement) {
                keyElement.classList.remove('active');
            }
        }

        // --- Helper to get key element from coordinates ---
        const pianoElement = document.querySelector('.piano');
        let currentMouseKey = null; // To track the key under the mouse for glissando
        let activeTouches = new Map(); // Stores { touchId: { currentKeyElement, currentNoteInfo } }

        function getKeyElementFromCoords(x, y) {
            const elements = document.elementsFromPoint(x, y);
            for (let i = 0; i < elements.length; i++) {
                if (elements[i].classList.contains('key') || elements[i].classList.contains('black-key')) {
                    // Make sure the element is part of the piano and not some overlay
                    if (pianoElement.contains(elements[i])) {
                        return elements[i];
                    }
                }
            }
            return null;
        }

        // --- Keyboard Events ---
        document.addEventListener('keydown', (event) => {
            const key = event.key.toUpperCase();
            if (keyMap[key] && !event.repeat) {
                const noteInfo = keyMap[key];
                const identifier = 'keyboard-' + key;

                if (!activeNotes.has(identifier)) {
                    const keyElement = document.querySelector(`[data-note="${noteInfo.note}"][data-octave="${noteInfo.octave}"]`);
                    activateKeyVisual(keyElement);
                    createAndPlayNote(noteInfo.note, noteInfo.octave, identifier, keyElement);
                }
            }
        });

        document.addEventListener('keyup', (event) => {
            const key = event.key.toUpperCase();
            if (keyMap[key]) {
                const identifier = 'keyboard-' + key;
                const activeNote = activeNotes.get(identifier);
                if (activeNote) {
                    deactivateKeyVisual(activeNote.keyElement);
                    activeNotes.delete(identifier);
                }
            }
        });

        // --- Mouse Events (for glissando) ---
        let isMouseDown = false;

        pianoElement.addEventListener('mousedown', (event) => {
            if (event.button === 0) { // Left click
                isMouseDown = true;
                const targetKey = getKeyElementFromCoords(event.clientX, event.clientY);
                if (targetKey) {
                    const note = targetKey.getAttribute('data-note');
                    const octave = parseInt(targetKey.getAttribute('data-octave'));
                    const identifier = 'mouse';

                    if (!activeNotes.has(identifier)) { // Only play if no mouse note is currently active
                        activateKeyVisual(targetKey);
                        createAndPlayNote(note, octave, identifier, targetKey);
                        currentMouseKey = targetKey; // Track the key that's currently "pressed" by the mouse
                    }
                }
            }
        });

        pianoElement.addEventListener('mousemove', (event) => {
            if (isMouseDown) {
                const targetKey = getKeyElementFromCoords(event.clientX, event.clientY);

                if (targetKey && targetKey !== currentMouseKey) {
                    // New key is being hovered over
                    const identifier = 'mouse';
                    const activeNote = activeNotes.get(identifier);

                    // Deactivate old key visual
                    if (activeNote) {
                        deactivateKeyVisual(activeNote.keyElement);
                    }

                    // Play new note
                    const note = targetKey.getAttribute('data-note');
                    const octave = parseInt(targetKey.getAttribute('data-octave'));
                    createAndPlayNote(note, octave, identifier, targetKey); // Overwrites the old note in activeNotes map

                    activateKeyVisual(targetKey);
                    currentMouseKey = targetKey;
                }
            }
        });

        document.addEventListener('mouseup', () => { // Listen on document for release outside piano
            if (isMouseDown) {
                isMouseDown = false;
                const identifier = 'mouse';
                const activeNote = activeNotes.get(identifier);
                if (activeNote) {
                    deactivateKeyVisual(activeNote.keyElement);
                    activeNotes.delete(identifier);
                }
                currentMouseKey = null;
            }
        });

        // --- Touch Events (Multitouch and Glissando) ---
        pianoElement.addEventListener('touchstart', (event) => {
            event.preventDefault(); // Prevent scrolling and zooming
            const changedTouches = event.changedTouches;

            for (let i = 0; i < changedTouches.length; i++) {
                const touch = changedTouches[i];
                const targetKey = getKeyElementFromCoords(touch.clientX, touch.clientY);

                if (targetKey) {
                    const note = targetKey.getAttribute('data-note');
                    const octave = parseInt(targetKey.getAttribute('data-octave'));
                    const touchIdentifier = 'touch-' + touch.identifier;

                    activateKeyVisual(targetKey);
                    createAndPlayNote(note, octave, touchIdentifier, targetKey);
                    activeTouches.set(touch.identifier, { currentKeyElement: targetKey, noteInfo: { note, octave } });
                }
            }
        }, { passive: false });

        pianoElement.addEventListener('touchmove', (event) => {
            event.preventDefault(); // Keep preventing default to avoid scrolling during glissando
            const changedTouches = event.changedTouches;

            for (let i = 0; i < changedTouches.length; i++) {
                const touch = changedTouches[i];
                const touchIdentifier = 'touch-' + touch.identifier;
                const currentTouchData = activeTouches.get(touch.identifier);

                if (currentTouchData) {
                    const targetKey = getKeyElementFromCoords(touch.clientX, touch.clientY);

                    if (targetKey && targetKey !== currentTouchData.currentKeyElement) {
                        // New key is being slid over
                        deactivateKeyVisual(currentTouchData.currentKeyElement); // Deactivate old visual

                        const note = targetKey.getAttribute('data-note');
                        const octave = parseInt(targetKey.getAttribute('data-octave'));

                        // Only play new note if it's different to prevent rapid re-triggering of the same note
                        if (currentTouchData.noteInfo.note !== note || currentTouchData.noteInfo.octave !== octave) {
                             createAndPlayNote(note, octave, touchIdentifier, targetKey); // Overwrites the old note
                        }
                        activateKeyVisual(targetKey);
                        activeTouches.set(touch.identifier, { currentKeyElement: targetKey, noteInfo: { note, octave } });
                    }
                }
            }
        }, { passive: false });

        pianoElement.addEventListener('touchend', (event) => {
            event.preventDefault();
            const changedTouches = event.changedTouches;

            for (let i = 0; i < changedTouches.length; i++) {
                const touch = changedTouches[i];
                const touchIdentifier = 'touch-' + touch.identifier;
                const activeNote = activeNotes.get(touchIdentifier);

                if (activeNote) {
                    deactivateKeyVisual(activeNote.keyElement);
                    activeNotes.delete(touchIdentifier); // Remove from active notes
                }
                activeTouches.delete(touch.identifier); // Remove from active touches tracking
            }
        });

        pianoElement.addEventListener('touchcancel', (event) => {
            event.preventDefault();
            const changedTouches = event.changedTouches;

            for (let i = 0; i < changedTouches.length; i++) {
                const touch = changedTouches[i];
                const touchIdentifier = 'touch-' + touch.identifier;
                const activeNote = activeNotes.get(touchIdentifier);

                if (activeNote) {
                    deactivateKeyVisual(activeNote.keyElement);
                    activeNotes.delete(touchIdentifier);
                }
                activeTouches.delete(touch.identifier);
            }
        });
    </script>
</body>
</html>
