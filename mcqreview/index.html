<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="../icons/BGicon.png">
    <link rel="stylesheet" href="../common-styles.css">
    <link rel="preload" href="../fonts/Zapfino.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <style>
         /* SHARED STYLES */
        /* Loaded from common-styles.css - Do not duplicate/edit: */
        /* body, h1, .Subtitle, .background, .overlay, .overlay2, .logo */

        .container {
            text-align: left;
            width: 90%;
            max-width: 1200px;
            display: flex;
            gap: 20px;
        }

        .login-section, .quiz-section {
            width: 100%;
        }

        .login-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .quiz-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .question-number {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
        }

        .options-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .option-button {
            width: 150px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .option-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .option-button.selected {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .confirmation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .confirmation-symbol {
            font-size: 4rem;
            opacity: 0;
            transform: scale(0);
            animation: symbolFadeIn 0.5s ease-out forwards;
        }

        .confirmation-text {
            font-size: 1.5rem;
            text-align: center;
            opacity: 0;
            animation: textFadeIn 0.5s ease-out forwards;
            animation-delay: 0.2s;
        }

        @keyframes symbolFadeIn {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .proceed-button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .proceed-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .results-section {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        .results-table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
            background: rgba(255, 255, 255, 0.1);
        }

        .results-table th,
        .results-table td {
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px;
            text-align: left;
        }

        .results-table th {
            background: rgba(255, 255, 255, 0.2);
        }

        .incorrect {
            color: #dc2626;
        }

        .correct-mark {
            color: #16a34a;
            margin-left: 4px;
        }

        .copy-button {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .copy-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

        const sortedQuestionDates = Object.keys(questionSets).sort();

function getCurrentSet() {
    if (questionSets[today]) {
        return { set: questionSets[today], found: true };
    }

    let mostRecentDate = null;
    for (const date of sortedQuestionDates) {
        if (date <= today) {
            mostRecentDate = date;
        } else {
            break;
        }
    }

    if (mostRecentDate) {
        return { set: questionSets[mostRecentDate], found: true };
    }

    const nextDate = sortedQuestionDates[0];
    const nextDateObj = new Date(nextDate + 'T00:00:00');
    const diffMs = nextDateObj - systemDate;
    const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    return { set: null, found: false, nextDate, daysUntil: diffDays };
}

        function findAnswer(originalQuestion) {
            const scrambledKey = originalQuestion * 3 + 7;
            const entry = hiddenData.find(([key]) => key === scrambledKey);
            return entry ? entry[1] : null; // Returns base64-encoded answer or null if not found
        }

        function unshiftString(str, shift) {
            return str.split('').map(char => {
                if (char.match(/[a-zA-Z]/)) {
                    const code = char.charCodeAt(0);
                    const base = char >= 'a' ? 97 : 65;
                    return String.fromCharCode((code - base - shift + 26) % 26 + base);
                }
                return char;
            }).join('');
        }

        function getCorrectAnswer(questionNum) {
            const scrambledAnswer = findAnswer(questionNum);
            if (!scrambledAnswer) return null;
            return unshiftString(atob(scrambledAnswer), 3);
        }

            };

        function displayResults(resultData) {
            const resultsSection = document.getElementById('results-section');
            resultsSection.innerHTML = '';
        
            const title = document.createElement('h2');
            title.textContent = `Results for ${resultData.student}`;
            resultsSection.appendChild(title);

            dateTime.textContent = `Date: ${resultData.date} | Time: ${resultData.time}`;
            resultsSection.appendChild(dateTime);
        
            const correctCount = resultData.answers.filter((ans, idx) => ans === resultData.correctAnswers[idx]).length;
            const percentage = Math.round((correctCount / totalQuestions) * 100);
            const score = document.createElement('p');
            score.textContent = `Score: ${correctCount}/${totalQuestions} (${percentage}%)`;
            resultsSection.appendChild(score);

                    <th>Correct Answer</th>
                </tr>

                            <td class="${isCorrect ? '' : 'incorrect'}">${answer}${isCorrect ? '<span class="correct-mark">√</span>' : ''}</td>

                        </tr>
                    `;
                }).join('')}
            `;
            resultsSection.appendChild(table);
        
            const pngButton = document.createElement('button');
            pngButton.className = 'copy-button';
            pngButton.id = 'copy-png-button';
            pngButton.textContent = 'Download Results';
            pngButton.style.display = 'block';
            pngButton.style.marginLeft = 'auto';
            pngButton.style.marginRight = 'auto';
            pngButton.style.marginTop = '20px';
            pngButton.onclick = () => generatePng(resultData);
            resultsSection.appendChild(pngButton);
        
            const qrContainer = document.createElement('div');
            qrContainer.id = 'qr-code';
            qrContainer.style.marginTop = '20px';
            qrContainer.style.width = '200px';
            qrContainer.style.height = '200px';
            qrContainer.style.marginLeft = 'auto';
            qrContainer.style.marginRight = 'auto';
            resultsSection.appendChild(qrContainer);
        
            const simplifiedResultData = { s: resultData.student, d: resultData.date, t: resultData.time, p: percentage };
            const jsonString = JSON.stringify(simplifiedResultData);
            const base64Data = btoa(jsonString);
            const baseUrl = window.location.origin + window.location.pathname;
            const resultUrl = `${baseUrl}?results=${encodeURIComponent(base64Data)}`;
        
            if (typeof kjua !== 'undefined') {
                const qr = kjua({
                    text: resultUrl,
                    size: 200,
                    fill: '#303f6c',
                    back: '#FFFFFF',
                    quiet: 0,
                    ecLevel: 'M',
                    render: 'canvas'
                });
                qrContainer.appendChild(qr);
            }
        }
        
        function generatePng(resultData) {
            const background = document.querySelector('.background');
            const overlay = document.querySelector('.overlay');
            const overlay2 = document.querySelector('.overlay2');
            const hamburgerMenu = document.querySelector('.hamburger-menu');
            const logo = document.querySelector('.logo');
            const copyPngBtn = document.getElementById('copy-png-button');
        
            background.style.display = 'none';
            overlay.style.display = 'none';
            overlay2.style.display = 'none';
            hamburgerMenu.style.display = 'none';
            if (logo) logo.style.display = 'none';
            copyPngBtn.style.visibility = 'hidden';
        
            html2canvas(document.body, {
                scale: 2,
                useCORS: true,
                backgroundColor: 'rgb(45, 70, 119)'
            }).then(canvas => {
                const logoImg = new Image();
                logoImg.crossOrigin = 'anonymous';
                logoImg.src = '../icons/Full Logo White on Transparent.png';
        
                logoImg.onload = () => {
                    const ctx = canvas.getContext('2d');
                    const logoWidth = canvas.width * 0.25;
                    const logoHeight = (logoImg.height / logoImg.width) * logoWidth;
                    const padding = 50 * 2;
                    ctx.drawImage(logoImg, canvas.width - logoWidth - padding, canvas.height - logoHeight - padding, logoWidth, logoHeight);
        
                    canvas.toBlob(blob => {
                        const link = document.createElement('a');
                        link.download = `Quiz_Results_${resultData.student}_${resultData.date}.png`;
                        link.href = URL.createObjectURL(blob);
                        link.click();
                        URL.revokeObjectURL(link.href);
                        resetDisplay();
                    });
                };
        
                logoImg.onerror = () => {
                    console.error('Failed to load logo image');
                    canvas.toBlob(blob => {
                        const link = document.createElement('a');
                        link.download = `Quiz_Results_${resultData.student}_${resultData.date}.png`;
                        link.href = URL.createObjectURL(blob);
                        link.click();
                        URL.revokeObjectURL(link.href);
                        resetDisplay();
                    });
                };
            }).catch(err => {
                console.error('Failed to generate PNG:', err);
                resetDisplay();
            });
        
            function resetDisplay() {
                background.style.display = '';
                overlay.style.display = '';
                overlay2.style.display = '';
                hamburgerMenu.style.display = '';
                if (logo) logo.style.display = '';
                copyPngBtn.style.visibility = 'visible';
            }
        }
        
        function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }
        

        // Hotkey functionality for quiz navigation
        document.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && document.activeElement.id === 'name-input') {
        checkName();
    } else if (isQuestionDisplayed) {
        // Handle question navigation and submission
        if (event.key === 'ArrowLeft') {
            event.preventDefault();
            selectedOptionIndex = (selectedOptionIndex === -1 ? 3 : (selectedOptionIndex - 1 + 4) % 4);
            updateSelectedOption();
        } else if (event.key === 'ArrowRight') {
            event.preventDefault();
            selectedOptionIndex = (selectedOptionIndex === -1 ? 0 : (selectedOptionIndex + 1) % 4);
            updateSelectedOption();
        } else if ((event.key === ' ' || event.key === 'Enter') && selectedOptionIndex !== -1) {
            event.preventDefault();
            const options = ['A', 'B', 'C', 'D'];
            selectAnswer(options[selectedOptionIndex]);
        } else if (['a', 'A', 'b', 'B', 'c', 'C', 'd', 'D'].includes(event.key)) {
            event.preventDefault();
            const answer = event.key.toUpperCase();
            selectAnswer(answer);
        }
    } else if (!isQuestionDisplayed && document.querySelector('.confirmation-container')) {
        // Handle proceeding to next question
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            proceedToNextQuestion();
        }
    } else if (!isQuestionDisplayed && document.getElementById('results-section') && !document.getElementById('results-section').classList.contains('hidden')) {
        // Handle results page download
        if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            const downloadButton = document.getElementById('copy-png-button');
            if (downloadButton) downloadButton.click();
        }
    }
});
        
        document.addEventListener('DOMContentLoaded', () => {
            const dateOptions = { weekday: 'long', month: 'long', day: 'numeric' };
            const formattedDate = systemDate.toLocaleDateString('en-US', dateOptions);
            document.getElementById('date-display').textContent = formattedDate;
        });
    </script>
