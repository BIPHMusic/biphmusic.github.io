<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../icons/BGicon.png">
    <link rel="stylesheet" href="../common-styles.css">
    <link rel="preload" href="../fonts/Zapfino.ttf" as="font" type="font/ttf" crossorigin="anonymous">
<title>Building Chords</title>
<style>
.wrapper {
    position: absolute; 
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center; 
    padding: 15px 20px 25px;
    width: 480px;  
    background-color: rgba(255, 255, 255, 0.85);
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

.chord-name {
    font-size: 21px; 
    font-weight: bold;
    margin-bottom: 15px;
    height: 28px;
    color: rgba(25, 50, 100, 0.8);
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;  
    width: 100%;
}

.block-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.block {
    width: 85px;  
    height: 85px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
    margin: 12px 0;
}

.face {
    position: absolute;
    width: 100%;
    height: 100%;
    background-color: #ffffff;
    color: black;
    border: 2px solid #333;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 21px;   
    font-weight: bold;
    backface-visibility: hidden;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
}

/* Face rotations */
.front { transform: rotateX(0deg) translateZ(42px); }
.back  { transform: rotateX(180deg) translateZ(42px); }
.right { transform: rotateY(90deg) translateZ(42px); }
.left  { transform: rotateY(-90deg) translateZ(42px); }
.top   { transform: rotateX(90deg) translateZ(42px); }
.bottom{ transform: rotateX(-90deg) translateZ(42px); }


.buttons {
    background-color: #67798a;
    border: none;
    color: white;
    padding: 8px 12px;
    font-size: 15px;
    margin: 4px 0;
    cursor: pointer;
    border-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

.buttons:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.buttons:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
    box-shadow: none;
}

.tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
    border-radius: 25px;
    padding: 4px;
}

.tab {
    padding: 8px 18px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 12px;
    background-color: #eceaea;
    color: #333;
    font-size: 15px;
}

.tab.active {
    background-color: #42a845e9;
    color: white;
}

.example-section {
    position: absolute;
    top: 82%;  
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    width: 100%;
}

.example-text {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 6px;
}

.note-display {
    font-size: 32px;          
    font-weight: bold;
    letter-spacing: 12px;
}

.note-display .accidental {
    font-size: 16px;
    vertical-align: super;
    margin-left: -12px;
    margin-right: -16px;
}

.invalid-combination {
    margin-top: 8px;
    font-size: 22px;
    color: rgba(255, 255, 255, 0.55);
}

@media (max-width: 600px) {
    .container {
        flex-wrap: wrap;
        gap: 15px;
    }
    .wrapper {
        width: 95%;
        padding: 12px 15px 20px;
    }
}
</style>
</head>
<body>
    <div id="shared-menu"></div>
    <script src="../menu.js"></script>
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="overlay2"></div>

    <h1 class="Title">BIPH Music</h1>
    <h1 class="Subtitle">Building Chords</h1>

    <div class="wrapper">
        <div class="tabs">
            <button class="tab buttons active" onclick="switchMode('triad')">Triads</button>
            <button class="tab buttons" onclick="switchMode('seventh')">Seventh Chords</button>
        </div>
        <div class="chord-name" id="chordName"></div>
        <div class="container" id="chordContainer"></div>
    </div>

    <div class="example-section">
        <div id="exampleContent">
            <div class="example-text">For example:</div>
            <div class="note-display" id="noteDisplay">C E G</div>
        </div>
    </div>

    <div class="logocontainer">        
        <img src="../icons/Full Logo White on Transparent.png" alt="BASIS Logo" class="logo">
    </div>

<script>
    const triadValues = [
        ['1'],
        ['M3', 'm3'],
        ['P5', 'A5', 'd5']
    ];
    const seventhValues = [
        ['1'],
        ['M3', 'm3'],
        ['P5', 'd5'],
        ['M7', 'd7', 'm7']
    ];

    let currentMode = 'triad';
    let currentIndex = [0, 0, 0, 0];
    let rotations = [0, 0, 0, 0];

    function createBlockHTML(blockIndex) {
        return `
            <div class="block-wrapper">
                <button class="buttons" onclick="changeValue(${blockIndex}, -1)" id="up${blockIndex}">▲</button>
                <div class="block" id="block${blockIndex}">
                    <div class="face front"></div>
                    <div class="face back"></div>
                    <div class="face right"></div>
                    <div class="face left"></div>
                    <div class="face top"></div>
                    <div class="face bottom"></div>
                </div>
                <button class="buttons" onclick="changeValue(${blockIndex}, 1)" id="down${blockIndex}">▼</button>
            </div>
        `;
    }

    function switchMode(mode) {
        currentMode = mode;
        currentIndex = [0, 0, 0, 0];
        rotations = [0, 0, 0, 0];

        const container = document.getElementById('chordContainer');
        container.innerHTML = '';

        const values = currentMode === 'triad' ? triadValues : seventhValues;
        for (let i = 0; i < values.length; i++) {
            container.innerHTML += createBlockHTML(i);
            updateBlockFaces(i);
        }

        updateButtonStates();
        updateChordName();

        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelector(`.tab[onclick="switchMode('${mode}')"]`).classList.add('active');
    }

    window.onload = function() {
        switchMode('triad');
    };

    function updateBlockFaces(blockIndex) {
        const block = document.getElementById(`block${blockIndex}`);
        const values = currentMode === 'triad' ? triadValues[blockIndex] : seventhValues[blockIndex];
        const faces = block.querySelectorAll('.face');
        faces.forEach((face, index) => {
            face.textContent = values[index % values.length];
        });
    }

    function changeValue(blockIndex, direction) {
        if (blockIndex === 0) return;

        const values = currentMode === 'triad' ? triadValues : seventhValues;
        const newIndex = (currentIndex[blockIndex] + direction + values[blockIndex].length) % values[blockIndex].length;

        currentIndex[blockIndex] = newIndex;
        rotations[blockIndex] += direction * 90;
        document.getElementById(`block${blockIndex}`).style.transform = `rotateX(${rotations[blockIndex]}deg)`;
        updateButtonStates();
        updateChordName();
    }

    function updateButtonStates() {
        const values = currentMode === 'triad' ? triadValues : seventhValues;
        for (let i = 0; i < values.length; i++) {
            const upButton = document.getElementById(`up${i}`);
            const downButton = document.getElementById(`down${i}`);

            if (i === 0) {
                upButton.disabled = true;
                downButton.disabled = true;
            } else {
                const currentValue = values[i][currentIndex[i]];
                if (currentMode === 'triad') {
                    if (i === 1) {
                        upButton.disabled = currentValue === 'M3';
                        downButton.disabled = currentValue === 'm3';
                    } else if (i === 2) {
                        upButton.disabled = currentValue === 'd5';
                        downButton.disabled = currentValue === 'A5';
                    }
                } else {
                    if (i === 1) {
                        upButton.disabled = currentValue === 'M3';
                        downButton.disabled = currentValue === 'm3';
                    } else if (i === 2) {
                        upButton.disabled = currentValue === 'P5';
                        downButton.disabled = currentValue === 'd5';
                    } else if (i === 3) {
                        upButton.disabled = currentValue === 'M7';
                        downButton.disabled = currentValue === 'm7';
                    }
                }
            }
        }
    }

    function updateChordName() {
        const values = currentMode === 'triad' ? triadValues : seventhValues;
        const chordValues = values.map((v, i) => v[currentIndex[i]]);

        let chordName = '';
        let rootNote = 'C';
        let thirdNote = 'E';
        let fifthNote = 'G';
        let seventhNote = '';
        let isValidCombination = true;

        if (currentMode === 'triad') {
            if (chordValues.join(',') === '1,M3,P5') chordName = 'Major Triad';
            else if (chordValues.join(',') === '1,m3,P5') {
                chordName = 'Minor Triad';
                thirdNote = 'E<span class="accidental">♭</span>';
            }
            else if (chordValues.join(',') === '1,m3,A5') {
                chordName = 'Diminished Triad';
                thirdNote = 'E<span class="accidental">♭</span>';
                fifthNote = 'G<span class="accidental">♭</span>';
            }
            else if (chordValues.join(',') === '1,M3,d5') {
                chordName = 'Augmented Triad';
                fifthNote = 'G<span class="accidental">♯</span>';
            }
            else isValidCombination = false;
        } else {
            seventhNote = 'B';
            if (chordValues.join(',') === '1,M3,P5,M7') chordName = 'Major 7';
            else if (chordValues.join(',') === '1,M3,P5,d7') {
                chordName = 'Dominant 7';
                seventhNote = 'B<span class="accidental">♭</span>';
            }
            else if (chordValues.join(',') === '1,m3,P5,d7') {
                chordName = 'Minor 7';
                thirdNote = 'E<span class="accidental">♭</span>';
                seventhNote = 'B<span class="accidental">♭</span>';
            }
            else if (chordValues.join(',') === '1,m3,d5,d7') {
                chordName = 'Half-Diminished 7';
                thirdNote = 'E<span class="accidental">♭</span>';
                fifthNote = 'G<span class="accidental">♭</span>';
                seventhNote = 'B<span class="accidental">♭</span>';
            }
            else if (chordValues.join(',') === '1,m3,d5,m7') {
                chordName = 'Diminished 7';
                thirdNote = 'E<span class="accidental">♭</span>';
                fifthNote = 'G<span class="accidental">♭</span>';
                seventhNote = 'B<span class="accidental">♭</span><span class="accidental"> ♭</span>';
            }
            else isValidCombination = false;
        }

        document.getElementById('chordName').textContent = chordName;

        const exampleContent = document.getElementById('exampleContent');
        if (isValidCombination) {
            exampleContent.innerHTML = `
                <div class="example-text">For example:</div>
                <div class="note-display" id="noteDisplay">${rootNote} ${thirdNote} ${fifthNote}${currentMode === 'seventh' ? ' ' + seventhNote : ''}</div>
            `;
        } else {
            exampleContent.innerHTML = `<div class="invalid-combination">(Invalid combination)</div>`;
        }
    }
</script>
</body>
</html>
