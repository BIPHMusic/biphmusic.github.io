<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Wall</title>
    <link rel="icon" href="icons/BGicon.png">
    <style>
        @font-face {
            font-family: 'Zapfino';
            src: url('fonts/Zapfino.ttf') format('truetype');
        }
        
        body {
            background-color: rgb(45, 70, 119);
            font-family: 'Andika', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgb(45, 70, 119), rgb(9, 32, 79));
            opacity: 0.8;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 70%, #303f6c 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, #236693 0%, transparent 50%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 1.5s infinite alternate;
        }
        .overlay2 {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 70% 70%, #ffffff 0%, transparent 50%),
                        radial-gradient(circle at 30% 30%, #b8b8b8 0%, transparent 50%);
            mix-blend-mode: overlay;
            opacity: 0.5;
            z-index: -1;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.1); }
        }

        .logocontainer {
            position: relative;
            min-height: 10vh;
            padding-bottom: 50px;
        }
        .logo {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 25vh;
            height: auto;
            z-index: 10; 
        }

                h1.Title {
            font-family: 'Arial', sans-serif;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
        }

        h1.Subtitle {
            font-family: 'Zapfino', sans-serif;
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
        }


#unitSelector {
    display: block;
    margin: 0 auto 25px;
    padding: 8px 12px;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 8px;
    cursor: pointer;
    width: auto;
    min-width: 180px;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%278%27 viewBox=%270 0 12 8%27 fill=%27white%27><polygon points=%276,8 0,0 12,0%27/></svg>');
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
}

#unitSelector:hover {
    background-color: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.6);
}

#unitSelector option {
    cursor: pointer;
}

        #glossary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .term-card {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 130px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0);
        }

        .term-card:hover {
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 5px 50px rgba(255, 255, 255, 0.05);
        }

        .term {
            font-family: sans-serif;
            font-size: 1.1em;
            margin-bottom: 12px;
            color: #fbe179;
            transition: filter 0.6s ease;
            position: relative;
        }

        .definition {
            font-size: 1.1em;
            line-height: 1.4;
            flex-grow: 1;
        }

        /* Hidden Mode - Strong Blur */
        .hidden-mode .term {
            filter: blur(50px);
        }

        /* Reveal Button */
        .term-card .reveal-btn {
            display: none;
            position: absolute;
            top: 8px;
            left: 12px;
            background: none;
            border: none;
            cursor: pointer;
            width: 38px;
            height: 38px;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .hidden-mode .term-card:hover .reveal-btn {
            display: block;
            opacity: 0.7;
        }

        .reveal-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .close-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            font-size: 19px;
            color: rgba(255, 255, 255, 0.65);
            cursor: pointer;
            z-index: 20;
        }
        .close-btn:hover { color: white; }

        /* Classic Poof Animation */
        .poof {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
        .poof::before,
        .poof::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }
        .poof::before {
            width: 80px;
            height: 80px;
            top: -20px;
            left: -20px;
        }
        .poof::after {
            width: 60px;
            height: 60px;
            top: 30px;
            left: 50px;
        }

        @keyframes poofAnimation {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0.6;
            }
            100% {
                transform: translate(-50%, -50%) scale(3.2);
                opacity: 0;
            }
        }

        /* Buttons */
        .hidden-mode-toggle {
            position: absolute;
            top: 50px;
            left: 11px;
            background: none;
            border: none;
            padding: 10px;
            cursor: pointer;
            width: 60px;
            height: 50px;
        }
        .shuffle-button {
            position: absolute;
            top: 95px;
            left: 11px;
            background: none;
            border: none;
            padding: 10px;
            opacity: 0.7;
            cursor: pointer;
            width: 60px;
            height: 50px;
        }
        .hidden-mode-toggle img, .shuffle-button img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    <div class="overlay2"></div>


    <h1 class="Title">BIPH Music</h1>
    <h1 class="Subtitle">Word Wall</h1>

    <select id="unitSelector" onchange="filterTerms()" style="margin-top: -20px;">
        <option value="Unit1">Unit 1</option>
        <!-- Add more units as needed -->
    </select>

    <button class="hidden-mode-toggle" onclick="toggleHiddenMode()">
        <img src="icons/hidden-off.png" alt="Toggle Hidden Mode" id="hiddenModeIcon">
    </button>

    <button class="shuffle-button" onclick="shuffleCards()">
        <img src="icons/shuffle.png" alt="Shuffle">
    </button>

    <div id="glossary"></div>

    <div class="logocontainer">        
        <img src="BASIS logo/Full Logo White on Transparent.png" alt="BASIS Logo" class="logo">
    </div>

    <div id="shared-menu"></div>
    <script src="../menu.js"></script>
    <script src="../terms.js"></script>
    <script>

        let hiddenMode = false;
        let currentOrder = [];

        function createTermCard(term) {
            const card = document.createElement('div');
            card.className = 'term-card';
            card.dataset.term = term.Term;

            card.innerHTML = `
                <div class="term">${term.Term}</div>
                <div class="definition">${term.Definition}</div>
                <button class="reveal-btn" onclick="revealTerm(this)">
                    <img src="icons/magnifying-glass.png" alt="Reveal">
                </button>
                <button class="close-btn" onclick="removeCard(this.parentElement)">✕</button>
            `;

            card.addEventListener('click', (e) => {
                if (e.target.closest('.reveal-btn') || e.target.closest('.close-btn')) return;
                if (!hiddenMode) removeCard(card);
            });

            return card;
        }

        function toggleHiddenMode() {
            hiddenMode = !hiddenMode;
            const icon = document.getElementById('hiddenModeIcon');
            icon.src = hiddenMode ? "icons/hidden-on.png" : "icons/hidden-off.png";
            document.body.classList.toggle('hidden-mode', hiddenMode);
            
            setTimeout(() => {
        renderCurrentCards();
    }, 500);
        }

        function renderCurrentCards() {
            const glossary = document.getElementById('glossary');
            glossary.innerHTML = '';

            if (currentOrder.length === 0) {
                theglossary.forEach(t => glossary.appendChild(createTermCard(t)));
                currentOrder = theglossary.map(t => t.Term);
            } else {
                currentOrder.forEach(name => {
                    const term = theglossary.find(t => t.Term === name);
                    if (term) glossary.appendChild(createTermCard(term));
                });
            }
        }

        function filterTerms() {
            const glossary = document.getElementById('glossary');
            glossary.innerHTML = '';

            theglossary.forEach(term => glossary.appendChild(createTermCard(term)));
            currentOrder = theglossary.map(t => t.Term);
        }

        function revealTerm(button) {
            const card = button.closest('.term-card');
            const termEl = card.querySelector('.term');
            
            termEl.style.filter = 'blur(0px)';
            button.style.display = 'none';

            setTimeout(() => {
                if (hiddenMode && card.isConnected) {
                    termEl.style.filter = 'blur(50px)';
                    button.style.display = 'block';
                }
            }, 2000);
        }

        function removeCard(card) {
            const poof = document.createElement('div');
            poof.className = 'poof';
            poof.style.animation = 'poofAnimation 0.45s ease-out forwards';
            card.appendChild(poof);

            card.style.transition = 'opacity 0.35s ease';
            card.style.opacity = '0';

            setTimeout(() => {
                card.remove();
                currentOrder = currentOrder.filter(t => t !== card.dataset.term);
            }, 400);
        }

        function shuffleCards() {
            const glossary = document.getElementById('glossary');
            let cards = Array.from(glossary.children);

            // Fisher-Yates shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }

            glossary.innerHTML = '';
            cards.forEach(card => glossary.appendChild(card));

            // Improved shuffle animation (similar to old version)
            const positions = cards.map(card => {
                const rect = card.getBoundingClientRect();
                return {
                    left: glossary.clientWidth / 2 - rect.left - rect.width / 2,
                    top: glossary.clientHeight / 2 - rect.top - rect.height / 2
                };
            });

            cards.forEach((card, i) => {
                card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                card.style.transform = `translate(${positions[i].left}px, ${positions[i].top}px)`;
                card.style.opacity = '0.15';
            });

            setTimeout(() => {
                cards.forEach(card => {
                    card.style.transition = '';
                    card.style.transform = '';
                    card.style.opacity = '1';
                });
            }, 400);

            currentOrder = cards.map(card => card.dataset.term);
        }



        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const unitSelector = document.getElementById('unitSelector');
            unitSelector.value = unitSelector.options[unitSelector.options.length - 1].value;
            filterTerms();
        });


    </script>
</body>
</html>
